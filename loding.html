<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loading - Home.Net</title>
<link rel="icon" href="img/Home.Net.png" type="image/png" />
<style>
:root{
  --bg:#020712;
  --bg-soft:#081224;
  --bg-deep:#0d1830;
  --text:#eef4ff;
  --muted:#a9bfdc;
  --line:rgba(255,255,255,.08);
  --line-soft:rgba(255,255,255,.05);
  --primary:#3b82f6;
  --primary-soft:#60a5fa;
  --primary-strong:#8fd0ff;
  --cyan:#67e8f9;
  --shadow:
    0 42px 120px rgba(0,0,0,.55),
    0 18px 50px rgba(0,0,0,.28);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 16% 10%, rgba(59,130,246,.22), transparent 24%),
    radial-gradient(circle at 84% 16%, rgba(103,232,249,.12), transparent 22%),
    radial-gradient(circle at 50% 110%, rgba(59,130,246,.18), transparent 36%),
    linear-gradient(160deg,var(--bg),var(--bg-soft) 45%,var(--bg-deep));
  overflow:hidden;
}

#loadingBox{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  opacity:1;
  pointer-events:auto;
  transition:opacity .34s ease;
}
#loadingBox.is-hidden{
  opacity:0;
  pointer-events:none;
}

.loading-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 16% 10%, rgba(59,130,246,.22), transparent 24%),
    radial-gradient(circle at 84% 16%, rgba(103,232,249,.12), transparent 22%),
    radial-gradient(circle at 50% 110%, rgba(59,130,246,.18), transparent 36%),
    linear-gradient(160deg,var(--bg),var(--bg-soft) 45%,var(--bg-deep));
  overflow:hidden;
}
.loading-bg::before,
.loading-bg::after{
  content:"";
  position:absolute;
  border-radius:50%;
  filter:blur(110px);
  opacity:.9;
}
.loading-bg::before{
  width:420px;
  height:420px;
  top:-120px;
  left:-100px;
  background:rgba(59,130,246,.22);
  animation:orbFloatA 12s ease-in-out infinite;
}
.loading-bg::after{
  width:380px;
  height:380px;
  right:-100px;
  bottom:-120px;
  background:rgba(103,232,249,.14);
  animation:orbFloatB 14s ease-in-out infinite;
}

.loading-grid,
.loading-noise,
.loading-rays,
.loading-stars{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.loading-grid{
  opacity:.14;
  background-image:
    linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
  background-size:34px 34px;
  mask-image:radial-gradient(circle at center, #000 34%, transparent 90%);
}

.loading-noise{
  opacity:.05;
  background-image:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.85) .6px, transparent .7px),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.7) .6px, transparent .7px),
    radial-gradient(circle at 40% 85%, rgba(255,255,255,.8) .6px, transparent .7px);
  background-size:120px 120px, 170px 170px, 190px 190px;
}

.loading-rays::before,
.loading-rays::after{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:72vmax;
  height:72vmax;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:
    conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(96,165,250,.08) 28deg,
      transparent 52deg,
      rgba(103,232,249,.06) 110deg,
      transparent 150deg,
      rgba(255,255,255,.04) 212deg,
      transparent 260deg,
      rgba(96,165,250,.07) 320deg,
      transparent 360deg
    );
  filter:blur(28px);
}
.loading-rays::before{animation:spinSlow 18s linear infinite}
.loading-rays::after{animation:spinSlowReverse 24s linear infinite; opacity:.6}

.loading-stars::before,
.loading-stars::after{
  content:"";
  position:absolute;
  inset:0;
  background-repeat:no-repeat;
}
.loading-stars::before{
  background-image:
    radial-gradient(circle, rgba(255,255,255,.9) 0 1px, transparent 1.6px),
    radial-gradient(circle, rgba(143,208,255,.8) 0 1.2px, transparent 1.8px),
    radial-gradient(circle, rgba(103,232,249,.7) 0 1px, transparent 1.6px),
    radial-gradient(circle, rgba(255,255,255,.75) 0 1px, transparent 1.6px);
  background-size:8px 8px, 10px 10px, 8px 8px, 9px 9px;
  background-position:12% 20%, 82% 25%, 30% 78%, 68% 72%;
  animation:starBlink 3.2s ease-in-out infinite;
}
.loading-stars::after{
  background-image:
    radial-gradient(circle, rgba(255,255,255,.55) 0 .9px, transparent 1.5px),
    radial-gradient(circle, rgba(96,165,250,.45) 0 .9px, transparent 1.5px),
    radial-gradient(circle, rgba(103,232,249,.5) 0 .9px, transparent 1.5px);
  background-size:7px 7px, 8px 8px, 8px 8px;
  background-position:22% 60%, 76% 58%, 52% 14%;
  animation:starBlink 4.8s ease-in-out infinite reverse;
}

.loading-shell{
  position:relative;
  width:min(92vw, 440px);
  padding:16px;
}
.loading-shell::before{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:38px;
  background:
    radial-gradient(circle at top, rgba(143,208,255,.13), transparent 46%),
    linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.01));
  filter:blur(14px);
  opacity:.85;
}
.loading-shell::after{
  content:"";
  position:absolute;
  inset:-36px;
  border-radius:48px;
  background:radial-gradient(circle at center, rgba(59,130,246,.16), transparent 62%);
  filter:blur(26px);
  animation:wrapAura 5.6s ease-in-out infinite;
}

.loading-card{
  position:relative;
  width:100%;
  overflow:hidden;
  border-radius:32px;
  border:1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.012)),
    linear-gradient(180deg, rgba(13,21,39,.92), rgba(8,15,30,.84));
  backdrop-filter:blur(26px) saturate(165%);
  -webkit-backdrop-filter:blur(26px) saturate(165%);
  box-shadow:var(--shadow);
  padding:32px 24px 24px;
  text-align:center;
  color:var(--text);
}
.loading-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(255,255,255,.08), transparent 34%),
    radial-gradient(circle at top right, rgba(96,165,250,.18), transparent 24%),
    radial-gradient(circle at bottom left, rgba(103,232,249,.08), transparent 28%);
  pointer-events:none;
}
.loading-card::after{
  content:"";
  position:absolute;
  inset:-24%;
  background:radial-gradient(circle at 50% 16%, rgba(255,255,255,.1), transparent 22%);
  pointer-events:none;
}

.loading-topline{
  position:relative;
  z-index:2;
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:16px;
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  color:#d8eaff;
  font-size:.78rem;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.loading-topline .dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--primary-soft), var(--cyan));
  box-shadow:0 0 14px rgba(96,165,250,.65);
  animation:dotPulse 1.8s ease-in-out infinite;
}

.loading-logo-zone{
  position:relative;
  z-index:2;
  width:148px;
  height:148px;
  margin:0 auto 18px;
  display:grid;
  place-items:center;
}
.loading-logo-zone::before,
.loading-logo-zone::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
}
.loading-logo-zone::before{
  background:conic-gradient(from 180deg, rgba(96,165,250,0), rgba(96,165,250,.6), rgba(255,255,255,.08), rgba(103,232,249,.32), rgba(96,165,250,0));
  filter:blur(10px);
  opacity:.78;
  animation:spinAura 8s linear infinite;
}
.loading-logo-zone::after{
  inset:16px;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
}

.orbit,
.orbit::before,
.orbit::after{
  position:absolute;
  inset:0;
  border-radius:50%;
}
.orbit{
  border:1px solid rgba(255,255,255,.06);
  animation:spinSlow 10s linear infinite;
}
.orbit::before,
.orbit::after{
  content:"";
  inset:auto;
  width:14px;
  height:14px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--primary-soft), var(--cyan));
  box-shadow:0 0 16px rgba(96,165,250,.45);
}
.orbit::before{top:10px; left:50%; transform:translateX(-50%)}
.orbit::after{bottom:16px; right:18px; width:10px; height:10px; opacity:.86}
.orbit.orbit-2{
  inset:14px;
  border-style:dashed;
  border-color:rgba(103,232,249,.16);
  animation-duration:13s;
  animation-direction:reverse;
}
.orbit.orbit-2::before{top:auto; bottom:10px; left:18px; width:12px; height:12px}
.orbit.orbit-2::after{top:18px; right:26px; bottom:auto; width:8px; height:8px}

.loading-logo-wrap{
  position:relative;
  z-index:2;
  width:104px;
  height:104px;
  border-radius:30px;
  display:grid;
  place-items:center;
  background:
    linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.02)),
    rgba(9,17,31,.72);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:
    0 24px 46px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.06),
    0 0 46px rgba(96,165,250,.12);
}
.loading-logo-wrap::before{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,.05);
}
.loading-logo{
  width:76px;
  height:76px;
  display:block;
  object-fit:contain;
  filter:drop-shadow(0 12px 22px rgba(59,130,246,.22));
  animation:logoFloat 4s ease-in-out infinite, logoGlow 2.8s ease-in-out infinite alternate;
}

.loading-text,
.loading-subtext,
.loading-progress-meta,
.progress-wrap,
.loading-footer,
.loading-pills{
  position:relative;
  z-index:2;
}
.loading-text{
  font-size:1.2rem;
  font-weight:900;
  letter-spacing:.01em;
  color:#f7fbff;
  text-shadow:0 0 18px rgba(96,165,250,.12);
}
.loading-subtext{
  margin-top:8px;
  font-size:.92rem;
  color:var(--muted);
  line-height:1.7;
}

.loading-pills{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin-top:18px;
}
.loading-pill{
  min-width:92px;
  padding:9px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.06);
  background:
    linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
    rgba(255,255,255,.02);
  color:#d8e7ff;
  font-size:.8rem;
  font-weight:800;
  letter-spacing:.02em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}

.spinner-wrap{
  position:relative;
  z-index:2;
  width:64px;
  height:64px;
  margin:18px auto 10px;
  display:grid;
  place-items:center;
}
.spinner-wrap::before{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(96,165,250,.18), transparent 65%);
  filter:blur(10px);
}
.spinner{
  width:54px;
  height:54px;
  border:3px solid rgba(255,255,255,.10);
  border-top-color:var(--primary-soft);
  border-right-color:rgba(103,232,249,.9);
  border-radius:50%;
  animation:spin 1s linear infinite;
  box-shadow:0 0 20px rgba(59,130,246,.14);
}
.spinner-core{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, #a8dbff 35%, #60a5fa 60%, rgba(59,130,246,.12) 100%);
  box-shadow:0 0 18px rgba(96,165,250,.5);
  animation:corePulse 1.8s ease-in-out infinite;
}

.loading-progress-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-top:16px;
  margin-bottom:8px;
  color:#d9e9ff;
  font-size:.84rem;
  font-weight:800;
}
.loading-progress-meta small{
  color:#8ea8ce;
  font-weight:700;
}
.loading-percent{
  min-width:44px;
  text-align:right;
  color:#f1f7ff;
}

.progress-wrap{
  width:100%;
  height:12px;
  border-radius:999px;
  background:rgba(255,255,255,.05);
  overflow:hidden;
  border:1px solid var(--line-soft);
  position:relative;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.progress-wrap::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent);
  animation:progressShine 2.2s linear infinite;
}
.progress-wrap::after{
  content:"";
  position:absolute;
  inset:2px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.03);
  pointer-events:none;
}
.progress-bar{
  width:0%;
  height:100%;
  border-radius:999px;
  background:linear-gradient(135deg,#3b82f6,#60a5fa 40%,#8fd0ff 68%,#67e8f9);
  box-shadow:
    0 0 22px rgba(59,130,246,.34),
    0 0 34px rgba(103,232,249,.12);
  transition:width .25s linear;
  position:relative;
  overflow:hidden;
}
.progress-bar::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, rgba(255,255,255,.0), rgba(255,255,255,.42), rgba(255,255,255,.0));
  transform:translateX(-100%);
  animation:barSheen 1.8s linear infinite;
}
.progress-bar::after{
  content:"";
  position:absolute;
  top:50%;
  right:4px;
  width:26px;
  height:26px;
  border-radius:50%;
  transform:translateY(-50%);
  background:radial-gradient(circle, rgba(255,255,255,.9), rgba(255,255,255,.12) 65%, transparent 72%);
  filter:blur(1px);
  opacity:.75;
}

.loading-footer{
  margin-top:16px;
  color:#7f97bc;
  font-size:.77rem;
  line-height:1.7;
}

@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes spinSlow{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes spinSlowReverse{0%{transform:rotate(360deg)}100%{transform:rotate(0)}}
@keyframes orbFloatA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(28px,18px) scale(1.08)}}
@keyframes orbFloatB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-22px,-16px) scale(1.06)}}
@keyframes logoFloat{0%,100%{transform:translateY(0) scale(1) rotate(0deg)}25%{transform:translateY(-5px) scale(1.02) rotate(-1.5deg)}50%{transform:translateY(-9px) scale(1.035) rotate(0deg)}75%{transform:translateY(-5px) scale(1.02) rotate(1.5deg)}}
@keyframes logoGlow{0%{filter:drop-shadow(0 0 0 rgba(96,165,250,0))}100%{filter:drop-shadow(0 0 16px rgba(96,165,250,.46))}}
@keyframes spinAura{to{transform:rotate(360deg)}}
@keyframes progressShine{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
@keyframes barSheen{from{transform:translateX(-100%)}to{transform:translateX(220%)}}
@keyframes wrapAura{0%,100%{opacity:.65;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
@keyframes corePulse{0%,100%{transform:scale(1); box-shadow:0 0 18px rgba(96,165,250,.4)}50%{transform:scale(1.14); box-shadow:0 0 24px rgba(96,165,250,.62)}}
@keyframes dotPulse{0%,100%{transform:scale(1); opacity:.85}50%{transform:scale(1.22); opacity:1}}
@keyframes starBlink{0%,100%{opacity:.55}50%{opacity:1}}

@media (max-width:480px){
  .loading-shell{width:min(94vw, 420px); padding:10px}
  .loading-card{padding:26px 16px 20px; border-radius:26px}
  .loading-logo-zone{width:126px; height:126px; margin-bottom:14px}
  .loading-logo-wrap{width:92px; height:92px; border-radius:24px}
  .loading-logo{width:68px; height:68px}
  .loading-text{font-size:1.08rem}
  .loading-subtext{font-size:.88rem}
  .loading-pills{gap:8px}
  .loading-pill{font-size:.75rem; min-width:84px; padding:8px 10px}
  .spinner-wrap{margin:16px auto 8px}
  .spinner{width:50px; height:50px}
  .loading-progress-meta{font-size:.8rem}
  .loading-footer{font-size:.74rem}
}
</style>
</head>
<body>
<div id="loadingBox">
  <div class="loading-bg"></div>
  <div class="loading-grid"></div>
  <div class="loading-rays"></div>
  <div class="loading-stars"></div>
  <div class="loading-noise"></div>

  <div class="loading-shell">
    <div class="loading-card">
      <div class="loading-topline">
        <span class="dot"></span>
        <span>Secure Access</span>
      </div>

      <div class="loading-logo-zone">
        <div class="orbit"></div>
        <div class="orbit orbit-2"></div>
        <div class="loading-logo-wrap">
          <img class="loading-logo" src="img/Home.Net.png" alt="Home.Net">
        </div>
      </div>

      <div class="loading-text">Menghubungkan ke jaringan...</div>
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-core"></div>
      </div>

      <div class="loading-progress-meta">
        <span>Status koneksi <small id="loadingStage">Memulai proses</small></span>
        <span class="loading-percent" id="loadingPercent">0%</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="loading-footer">
        Home.Net premium hotspot experience • Tunggu bentar ya, bentar lagi tembus 🌐
      </div>
    </div>
  </div>
</div>
<script>
const loadingBox = document.getElementById('loadingBox');
const progressBar = document.getElementById('progressBar');
const loadingPercent = document.getElementById('loadingPercent');
const loadingStage = document.getElementById('loadingStage');

function updateProgressUI(value){
  const percent = Math.max(0, Math.min(100, Number(value) || 0));
  progressBar.style.width = percent + '%';
  loadingPercent.textContent = percent + '%';

  if (percent <= 15) {
    loadingStage.textContent = 'Memulai proses';
  } else if (percent <= 35) {
    loadingStage.textContent = 'Cek voucher';
  } else if (percent <= 60) {
    loadingStage.textContent = 'Sinkron jaringan';
  } else if (percent <= 85) {
    loadingStage.textContent = 'Otentikasi aman';
  } else if (percent < 100) {
    loadingStage.textContent = 'Finalisasi akses';
  } else {
    loadingStage.textContent = 'Selesai';
  }
}

window.addEventListener('message', (event) => {
  const data = event.data || {};

  if (data.type === 'loading-show') {
    loadingBox.classList.remove('is-hidden');
    updateProgressUI(0);
  }

  if (data.type === 'loading-hide') {
    loadingBox.classList.add('is-hidden');
    updateProgressUI(0);
  }

  if (data.type === 'loading-progress') {
    updateProgressUI(data.value);
  }
});

// Kalau file dibuka langsung, tampilkan loading biar nggak putih polos.
if (window.top === window.self) {
  loadingBox.classList.remove('is-hidden');

  let previewProgress = 0;
  const previewTimer = setInterval(() => {
    previewProgress += 10;
    updateProgressUI(previewProgress);

    if (previewProgress >= 100) {
      clearInterval(previewTimer);
    }
  }, 140);
}
</script>
</body>
</html>
