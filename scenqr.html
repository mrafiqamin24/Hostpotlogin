<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scan QR - Home.Net</title>
<link rel="icon" href="img/Home.Net.png" type="image/png" />
<style>
:root{
  --primary:#3b82f6;
  --primary-soft:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
body{
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:transparent;
  overflow:hidden;
}
.qr-modal{
  position:fixed;
  inset:0;
  z-index:1200;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  opacity:0;
  pointer-events:none;
  transition:.28s ease;
}
.qr-modal.show{opacity:1;pointer-events:auto}
.qr-backdrop{
  position:absolute;
  inset:0;
  background:radial-gradient(circle at center, rgba(59,130,246,.1), transparent 35%), rgba(3,8,18,.78);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
}
.qr-card{
  position:relative;
  width:min(100%, 450px);
  background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)), rgba(10,18,34,.94);
  border:1px solid rgba(255,255,255,.08);
  border-radius:32px;
  box-shadow:0 30px 90px rgba(0,0,0,.48);
  padding:18px;
  overflow:hidden;
  color:#eef4ff;
}
.qr-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.05), transparent 42%), radial-gradient(circle at top right, rgba(96,165,250,.12), transparent 28%);
  pointer-events:none;
}
.qr-card::after{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:inherit;
  background:conic-gradient(from 180deg, rgba(96,165,250,0), rgba(96,165,250,.2), rgba(255,255,255,.05), rgba(103,232,249,.12), rgba(96,165,250,0));
  filter:blur(12px);
  opacity:.5;
  pointer-events:none;
}
.qr-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px;position:relative;z-index:1}
.qr-title{font-size:1rem;font-weight:900;color:#eef4ff}
.qr-close{
  width:40px;height:40px;border-radius:14px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.04);color:#fff;font-size:1rem;cursor:pointer;transition:.2s ease;
}
.qr-close:hover{background:rgba(255,255,255,.07);transform:translateY(-1px)}
.qr-view{
  position:relative;
  border-radius:24px;
  overflow:hidden;
  background:radial-gradient(circle at center, rgba(96,165,250,.07), transparent 45%), #06101f;
  border:1px solid rgba(96,165,250,.16);
  aspect-ratio:1 / 1;
  box-shadow:inset 0 0 30px rgba(59,130,246,.08), 0 10px 30px rgba(0,0,0,.18);
  animation:qrPulse 3s ease-in-out infinite;
}
.qr-view::before{content:"";position:absolute;inset:10px;border-radius:20px;border:1px solid rgba(255,255,255,.03);pointer-events:none;z-index:2}
#qrVideo{width:100%;height:100%;object-fit:cover;display:block;background:#06101f}
.qr-overlay{position:absolute;inset:0;pointer-events:none}
.qr-overlay::before{
  content:"";
  position:absolute;
  inset:12%;
  border:2px solid rgba(96,165,250,.95);
  border-radius:24px;
  box-shadow:0 0 0 999px rgba(4,10,18,.24), 0 0 18px rgba(96,165,250,.3), inset 0 0 24px rgba(96,165,250,.08);
}
.qr-corners{position:absolute;inset:12%;z-index:3}
.qr-corners span{position:absolute;width:24px;height:24px;border-color:#9fd0ff;filter:drop-shadow(0 0 10px rgba(96,165,250,.34))}
.qr-corners span:nth-child(1){top:-1px;left:-1px;border-top:3px solid currentColor;border-left:3px solid currentColor;border-top-left-radius:12px}
.qr-corners span:nth-child(2){top:-1px;right:-1px;border-top:3px solid currentColor;border-right:3px solid currentColor;border-top-right-radius:12px}
.qr-corners span:nth-child(3){bottom:-1px;left:-1px;border-bottom:3px solid currentColor;border-left:3px solid currentColor;border-bottom-left-radius:12px}
.qr-corners span:nth-child(4){bottom:-1px;right:-1px;border-bottom:3px solid currentColor;border-right:3px solid currentColor;border-bottom-right-radius:12px}
.qr-scan-line{
  position:absolute;left:12%;right:12%;height:3px;border-radius:999px;background:linear-gradient(90deg, transparent, #60a5fa, transparent);box-shadow:0 0 16px rgba(96,165,250,.8);animation:scanLine 2.1s linear infinite;z-index:3;
}
.qr-status{
  margin-top:14px;padding:13px 14px;border-radius:16px;background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)), rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.16);color:#d6ebff;font-size:.9rem;line-height:1.6;position:relative;z-index:1;
}
.qr-actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;position:relative;z-index:1}
.qr-action-btn{
  flex:1 1 120px;min-height:48px;border-radius:16px;border:1px solid rgba(96,165,250,.14);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)), rgba(255,255,255,.02);color:#eef4ff;font-weight:800;cursor:pointer;transition:.2s ease;display:inline-flex;align-items:center;justify-content:center;text-align:center;line-height:1.2;gap:6px;
}
.qr-action-btn:hover{transform:translateY(-1px);border-color:rgba(96,165,250,.34)}
.qr-action-btn.primary{background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02)), linear-gradient(135deg,var(--primary),var(--primary-soft));border-color:transparent;box-shadow:0 12px 28px rgba(59,130,246,.26)}
#qrImageInput{display:none}
@keyframes scanLine{0%{top:16%;opacity:.7}50%{top:82%;opacity:1}100%{top:16%;opacity:.7}}
@keyframes qrPulse{0%,100%{box-shadow:inset 0 0 30px rgba(59,130,246,.08), 0 10px 30px rgba(0,0,0,.18)}50%{box-shadow:inset 0 0 34px rgba(59,130,246,.1), 0 10px 30px rgba(0,0,0,.18), 0 0 30px rgba(96,165,250,.18)}}
@media (max-width:480px){.qr-card{padding:14px;border-radius:22px}.qr-action-btn{min-height:44px;font-size:.85rem}}
</style>
</head>
<body>
<div class="qr-modal" id="qrModal">
  <div class="qr-backdrop" id="qrBackdrop"></div>
  <div class="qr-card">
    <div class="qr-head">
      <div class="qr-title">Scan QR Voucher</div>
      <button type="button" class="qr-close" id="closeQrBtn">✕</button>
    </div>

    <div class="qr-view">
      <video id="qrVideo" playsinline muted></video>
      <canvas id="qrCanvas" hidden></canvas>
      <div class="qr-overlay">
        <div class="qr-corners">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="qr-scan-line"></div>
      </div>
    </div>

    <div class="qr-status" id="qrStatus">
      Arahkan kamera ke QR code voucher. Begitu kebaca, voucher langsung keisi dan auto login.
    </div>

    <div class="qr-actions" id="qrActions">
      <button type="button" class="qr-action-btn primary" id="startQrBtn">📷 Nyalakan Kamera</button>
      <button type="button" class="qr-action-btn" id="uploadQrBtn">📤 Upload QR</button>
    </div>

    <input type="file" id="qrImageInput" accept="image/*" />
  </div>
</div>
<script src="js/jsQR.js"></script>
<script>
const qrModal = document.getElementById('qrModal');
const closeQrBtn = document.getElementById('closeQrBtn');
const qrBackdrop = document.getElementById('qrBackdrop');
const startQrBtn = document.getElementById('startQrBtn');
const uploadQrBtn = document.getElementById('uploadQrBtn');
const qrImageInput = document.getElementById('qrImageInput');
const qrVideo = document.getElementById('qrVideo');
const qrStatus = document.getElementById('qrStatus');
const qrCanvas = document.getElementById('qrCanvas');
const qrCanvasCtx = qrCanvas.getContext('2d', { willReadFrequently: true });

let qrStream = null;
let qrAnimationFrame = null;
let qrDetector = null;
let qrScanning = false;
let isAutoLoggingIn = false;
let lastQrScanAt = 0;
const qrScanInterval = 180;

function isBarcodeDetectorSupported() {
  return typeof window.BarcodeDetector !== 'undefined';
}
async function createBarcodeDetectorIfPossible() {
  if (!isBarcodeDetectorSupported()) return null;
  try {
    if (typeof BarcodeDetector.getSupportedFormats === 'function') {
      const formats = await BarcodeDetector.getSupportedFormats();
      if (Array.isArray(formats) && !formats.includes('qr_code')) return null;
    }
    return new BarcodeDetector({ formats: ['qr_code'] });
  } catch (err) {
    return null;
  }
}
function hasJsQrSupport() {
  return typeof window.jsQR === 'function';
}
function isSecureCameraContext() {
  return window.isSecureContext === true || location.protocol === 'https:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
}
function hasCameraApiSupport() {
  return !!(navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function');
}
function setQrStatus(message) {
  qrStatus.textContent = message;
}
async function decodeQrFromCanvas() {
  let rawValue = '';
  if (qrDetector) {
    try {
      const barcodes = await qrDetector.detect(qrCanvas);
      if (barcodes && barcodes.length > 0 && barcodes[0].rawValue) rawValue = String(barcodes[0].rawValue || '').trim();
    } catch (error) {}
  }
  if (!rawValue && hasJsQrSupport()) {
    try {
      const imageData = qrCanvasCtx.getImageData(0, 0, qrCanvas.width, qrCanvas.height);
      const result = window.jsQR(imageData.data, qrCanvas.width, qrCanvas.height, { inversionAttempts: 'attemptBoth' });
      if (result && result.data) rawValue = String(result.data || '').trim();
    } catch (error) {}
  }
  return rawValue;
}
function notifyParent(type, payload) {
  window.parent.postMessage({ type, ...payload }, '*');
}
function closeQrModal() {
  qrModal.classList.remove('show');
  stopQrScanner();
  isAutoLoggingIn = false;
  setQrStatus('Arahkan kamera ke QR code voucher. Begitu kebaca, voucher langsung keisi dan auto login.');
}
function requestParentClose() {
  closeQrModal();
  notifyParent('qr-close-request', {});
}
function stopQrScanner() {
  qrScanning = false;
  if (qrAnimationFrame) {
    cancelAnimationFrame(qrAnimationFrame);
    qrAnimationFrame = null;
  }
  if (qrVideo) {
    qrVideo.pause();
    qrVideo.srcObject = null;
  }
  if (qrStream) {
    qrStream.getTracks().forEach(track => track.stop());
    qrStream = null;
  }
  qrCanvasCtx.clearRect(0, 0, qrCanvas.width || 0, qrCanvas.height || 0);
}
async function startQrScanner() {
  if (!isSecureCameraContext()) {
    setQrStatus('Kamera butuh HTTPS atau localhost.');
    return;
  }
  if (!hasCameraApiSupport()) {
    setQrStatus('Browser ini belum dukung akses kamera. Coba pakai Upload QR.');
    return;
  }
  try {
    qrDetector = await createBarcodeDetectorIfPossible();
    if (!qrDetector && !hasJsQrSupport()) {
      setQrStatus('Decoder QR tidak tersedia. Pastikan file jsQR.js ada dan berhasil dimuat.');
      return;
    }
    stopQrScanner();
    qrStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    qrVideo.setAttribute('playsinline', true);
    qrVideo.setAttribute('autoplay', true);
    qrVideo.setAttribute('muted', true);
    qrVideo.srcObject = qrStream;
    await qrVideo.play();
    qrScanning = true;
    lastQrScanAt = 0;
    setQrStatus('Arahkan kamera ke QR code voucher.');
    scanQrFrame();
  } catch (error) {
    if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
      setQrStatus('Izin kamera ditolak. Pakai Upload QR aja ya.');
    } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
      setQrStatus('Kamera tidak ditemukan di perangkat ini.');
    } else {
      setQrStatus('Kamera gagal dibuka. Coba lagi atau pakai Upload QR.');
    }
  }
}
async function scanQrFrame(timestamp = 0) {
  if (!qrScanning || isAutoLoggingIn) return;
  try {
    if (qrVideo.readyState >= 2) {
      const videoWidth = qrVideo.videoWidth || qrVideo.clientWidth;
      const videoHeight = qrVideo.videoHeight || qrVideo.clientHeight;
      if (videoWidth && videoHeight && timestamp - lastQrScanAt >= qrScanInterval) {
        lastQrScanAt = timestamp;
        qrCanvas.width = videoWidth;
        qrCanvas.height = videoHeight;
        qrCanvasCtx.drawImage(qrVideo, 0, 0, videoWidth, videoHeight);
        const rawValue = await decodeQrFromCanvas();
        if (rawValue) {
          autoLoginFromQr(rawValue);
          return;
        }
      }
    }
  } catch (error) {}
  qrAnimationFrame = requestAnimationFrame(scanQrFrame);
}
function autoLoginFromQr(code) {
  if (!code || isAutoLoggingIn) return;
  isAutoLoggingIn = true;
  setQrStatus('QR berhasil dibaca. Voucher langsung diisi.');
  notifyParent('qr-result', { code: code.trim() });
}
qrImageInput.addEventListener('change', async (event) => {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  try {
    if (window.createImageBitmap) {
      const imageBitmap = await createImageBitmap(file);
      qrCanvas.width = imageBitmap.width;
      qrCanvas.height = imageBitmap.height;
      qrCanvasCtx.drawImage(imageBitmap, 0, 0, imageBitmap.width, imageBitmap.height);
      if (imageBitmap.close) imageBitmap.close();
    } else {
      const img = new Image();
      const objectUrl = URL.createObjectURL(file);
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = objectUrl;
      });
      qrCanvas.width = img.naturalWidth || img.width;
      qrCanvas.height = img.naturalHeight || img.height;
      qrCanvasCtx.drawImage(img, 0, 0, qrCanvas.width, qrCanvas.height);
      URL.revokeObjectURL(objectUrl);
    }
    if (!qrDetector) qrDetector = await createBarcodeDetectorIfPossible();
    const rawValue = await decodeQrFromCanvas();
    if (rawValue) {
      setQrStatus('QR dari gambar berhasil dibaca. Auto login jalan...');
      autoLoginFromQr(rawValue);
    } else {
      setQrStatus('QR tidak terdeteksi dari gambar itu. Coba gambar yang lebih jelas.');
    }
  } catch (error) {
    setQrStatus('Gagal membaca gambar QR. Coba file lain yang lebih jelas.');
  }
  event.target.value = '';
});
closeQrBtn.addEventListener('click', requestParentClose);
qrBackdrop.addEventListener('click', requestParentClose);
startQrBtn.addEventListener('click', startQrScanner);
uploadQrBtn.addEventListener('click', () => qrImageInput.click());
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && qrModal.classList.contains('show')) requestParentClose();
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopQrScanner();
});
window.addEventListener('beforeunload', stopQrScanner);
window.addEventListener('message', async (event) => {
  const data = event.data || {};
  if (data.type === 'qr-open') {
    qrModal.classList.add('show');
    setQrStatus('Menyiapkan kamera QR...');
    try {
      await startQrScanner();
    } catch (error) {
      setQrStatus('Kamera gagal otomatis jalan. Coba tekan Nyalakan Kamera atau pakai Upload QR.');
    }
  }
  if (data.type === 'qr-close') {
    closeQrModal();
  }
});
(async function initQrFeatures() {
  qrDetector = await createBarcodeDetectorIfPossible();
})();
</script>
</body>
</html>
