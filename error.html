<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Error Login</title>
<link rel="icon" href="img/Home.Net.png" type="image/png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
:root{
  --bg:#180909;
  --bg2:#2a0f0f;
  --card:rgba(30,10,10,.78);
  --text:#eef4ff;
  --blue:#3b82f6;
  --blue2:#2563eb;
  --red:#ef4444;
  --red2:#dc2626;
  --line:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  overflow-x:hidden;
}

body{
  font-family:Inter,system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 20%, rgba(239,68,68,.18), transparent 28%),
    radial-gradient(circle at 85% 18%, rgba(220,38,38,.14), transparent 24%),
    radial-gradient(circle at 50% 100%, rgba(255,0,0,.10), transparent 35%),
    linear-gradient(180deg,var(--bg),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text);
  position:relative;
}

/* ambient */
body::before,
body::after{
  content:"";
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  pointer-events:none;
  z-index:0;
}

body::before{
  width:240px;
  height:240px;
  top:8%;
  left:8%;
  background:rgba(239,68,68,.10);
  animation:floatBlob 8s ease-in-out infinite;
}

body::after{
  width:280px;
  height:280px;
  bottom:6%;
  right:8%;
  background:rgba(220,38,38,.12);
  animation:floatBlob 10s ease-in-out infinite reverse;
}

@keyframes floatBlob{
  0%,100%{transform:translateY(0) translateX(0) scale(1)}
  50%{transform:translateY(-12px) translateX(10px) scale(1.08)}
}

/* hacker overlays */
.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.035) 0px,
      rgba(255,255,255,.035) 1px,
      transparent 2px,
      transparent 4px
    );
  mix-blend-mode:soft-light;
  opacity:.28;
  animation:scanMove 8s linear infinite;
}

.noise{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:.06;
  background-image:radial-gradient(rgba(255,255,255,.6) .6px, transparent .8px);
  background-size:4px 4px;
  animation:noiseShift .25s steps(2) infinite;
}

@keyframes scanMove{
  0%{transform:translateY(0)}
  100%{transform:translateY(8px)}
}

@keyframes noiseShift{
  0%{transform:translate(0,0)}
  25%{transform:translate(-1px,1px)}
  50%{transform:translate(1px,-1px)}
  75%{transform:translate(1px,1px)}
  100%{transform:translate(0,0)}
}

/* status pojok */
.top-status{
  position:fixed;
  top:14px;
  left:16px;
  font-size:.92rem;
  font-weight:800;
  color:#fecaca;
  display:flex;
  align-items:center;
  gap:8px;
  z-index:20;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(127,29,29,.28);
  border:1px solid rgba(239,68,68,.22);
  backdrop-filter:blur(10px);
  box-shadow:0 10px 30px rgba(0,0,0,.18);
  transition:opacity .5s ease, transform .5s ease, visibility .5s ease;
}

.top-status.hide{
  opacity:0;
  transform:translateY(-12px);
  visibility:hidden;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#ef4444;
  animation:blink 1s infinite;
  box-shadow:0 0 8px #ef4444, 0 0 18px rgba(239,68,68,.8);
}

@keyframes blink{
  0%{opacity:1; transform:scale(1)}
  50%{opacity:.25; transform:scale(.82)}
  100%{opacity:1; transform:scale(1)}
}

/* card */
.card{
  width:100%;
  max-width:440px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
    var(--card);
  border-radius:30px;
  padding:30px 22px 22px;
  backdrop-filter:blur(18px);
  box-shadow:
    0 24px 70px rgba(0,0,0,.45),
    0 0 35px rgba(239,68,68,.14),
    inset 0 1px 0 rgba(255,255,255,.06);
  text-align:center;
  border:1px solid var(--line);
  animation:cardShake .45s ease;
  position:relative;
  overflow:hidden;
  z-index:2;
}

.card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 30%, transparent 70%, rgba(255,255,255,.03));
  pointer-events:none;
}

.card::after{
  content:"";
  position:absolute;
  top:-80px;
  right:-80px;
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(239,68,68,.14), transparent 70%);
  filter:blur(12px);
  pointer-events:none;
}

@keyframes cardShake{
  0%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
  100%{transform:translateX(0)}
}

/* logo */
.logo-wrap{
  position:relative;
  width:max-content;
  margin:0 auto 14px;
}

.logo-wrap::before{
  content:"";
  position:absolute;
  inset:-12px;
  border-radius:26px;
  background:radial-gradient(circle, rgba(239,68,68,.26), transparent 70%);
  filter:blur(10px);
  animation:haloPulse 2.2s ease-in-out infinite;
}

.logo{
  position:relative;
  width:84px;
  height:84px;
  margin:auto;
  border-radius:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(145deg, #ff5b5b, #dc2626 55%, #991b1b);
  font-size:34px;
  font-weight:800;
  color:white;
  box-shadow:
    0 16px 35px rgba(239,68,68,.32),
    inset 0 1px 0 rgba(255,255,255,.25),
    inset 0 -8px 18px rgba(0,0,0,.18);
  animation:iconPulse 1.8s infinite;
  overflow:hidden;
}

.logo::before{
  content:"";
  position:absolute;
  inset:-40%;
  background:conic-gradient(
    from 0deg,
    transparent 0deg,
    rgba(255,255,255,.75) 45deg,
    transparent 90deg,
    transparent 220deg,
    rgba(255,255,255,.18) 270deg,
    transparent 320deg
  );
  animation:spinShine 3.2s linear infinite;
}

.logo::after{
  content:"";
  position:absolute;
  width:130%;
  height:130%;
  background:radial-gradient(circle, rgba(255,255,255,.16), transparent 55%);
  animation:flashBreath 1.8s ease-in-out infinite;
}

.logo-icon{
  position:relative;
  z-index:2;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transform-origin:center;
  animation:crossPop 1.6s ease-in-out infinite;
  text-shadow:0 0 12px rgba(255,255,255,.28);
}

@keyframes spinShine{
  100%{transform:rotate(360deg)}
}

@keyframes iconPulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.05)}
}

@keyframes haloPulse{
  0%,100%{transform:scale(1); opacity:.8}
  50%{transform:scale(1.12); opacity:1}
}

@keyframes flashBreath{
  0%,100%{opacity:.45; transform:scale(.92)}
  50%{opacity:.9; transform:scale(1.08)}
}

@keyframes crossPop{
  0%,100%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(1.14) rotate(-5deg)}
  40%{transform:scale(.96) rotate(4deg)}
  60%{transform:scale(1.08) rotate(-3deg)}
  80%{transform:scale(1) rotate(0deg)}
}

/* title */
h1{
  font-size:1.52rem;
  margin-bottom:16px;
  letter-spacing:.3px;
  position:relative;
  display:inline-block;
}

h1::before,
h1::after{
  content:"Home.Net";
  position:absolute;
  left:0;
  top:0;
  pointer-events:none;
  opacity:.18;
}

h1::before{
  color:#ff4d4d;
  transform:translate(-1px,0);
  animation:titleGlitch 2.2s infinite linear alternate-reverse;
}

h1::after{
  color:#60a5fa;
  transform:translate(1px,0);
  animation:titleGlitch 1.8s infinite linear alternate-reverse;
}

@keyframes titleGlitch{
  0%{clip-path:inset(0 0 85% 0)}
  20%{clip-path:inset(10% 0 55% 0)}
  40%{clip-path:inset(30% 0 30% 0)}
  60%{clip-path:inset(65% 0 10% 0)}
  80%{clip-path:inset(40% 0 35% 0)}
  100%{clip-path:inset(85% 0 0 0)}
}

/* error box */
.error-box{
  margin-top:10px;
  border-radius:20px;
  padding:18px 16px;
  background:linear-gradient(180deg, rgba(239,68,68,.18), rgba(127,29,29,.18));
  border:1px solid rgba(239,68,68,.30);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.04),
    0 10px 22px rgba(0,0,0,.12);
  display:grid;
  gap:10px;
  position:relative;
  overflow:hidden;
  animation:errorPulse 2.2s infinite ease-in-out;
}

.error-box::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 10%,
    rgba(255,255,255,.10) 50%,
    transparent 90%
  );
  transform:translateX(-120%);
  animation:errorSweep 3s linear infinite;
}

.error-box i{
  font-size:1.1rem;
  color:#fecaca;
  filter:drop-shadow(0 0 6px rgba(239,68,68,.35));
}

.error-text{
  position:relative;
  font-weight:600;
  line-height:1.5;
  word-break:break-word;
  animation:errorTextPulse 2s ease-in-out infinite;
}

.error-text.glitching{
  animation:
    errorTextPulse 2s ease-in-out infinite,
    errorTextGlitch 120ms steps(2) 0s 10;
}

.error-text.glitching::before,
.error-text.glitching::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  pointer-events:none;
  overflow:hidden;
  white-space:normal;
}

.error-text.glitching::before{
  color:#ff5b5b;
  text-shadow:-2px 0 rgba(255,0,0,.45);
  transform:translate(-2px,0);
  animation:errorSlice1 150ms steps(2) 0s 8;
}

.error-text.glitching::after{
  color:#60a5fa;
  text-shadow:2px 0 rgba(96,165,250,.45);
  transform:translate(2px,0);
  animation:errorSlice2 180ms steps(2) 0s 8;
}

@keyframes errorPulse{
  0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 10px 22px rgba(0,0,0,.12)}
  50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 22px rgba(0,0,0,.12), 0 0 20px rgba(239,68,68,.18)}
}

@keyframes errorSweep{
  100%{transform:translateX(120%)}
}

@keyframes errorTextPulse{
  0%,100%{text-shadow:0 0 0 rgba(239,68,68,0)}
  50%{text-shadow:0 0 12px rgba(239,68,68,.18)}
}

@keyframes errorTextGlitch{
  0%{transform:translate(0,0)}
  25%{transform:translate(-1px,1px)}
  50%{transform:translate(1px,-1px)}
  75%{transform:translate(-1px,0)}
  100%{transform:translate(0,0)}
}

@keyframes errorSlice1{
  0%{clip-path:inset(0 0 80% 0)}
  25%{clip-path:inset(20% 0 35% 0)}
  50%{clip-path:inset(65% 0 8% 0)}
  75%{clip-path:inset(35% 0 30% 0)}
  100%{clip-path:inset(80% 0 0 0)}
}

@keyframes errorSlice2{
  0%{clip-path:inset(75% 0 0 0)}
  25%{clip-path:inset(40% 0 32% 0)}
  50%{clip-path:inset(10% 0 58% 0)}
  75%{clip-path:inset(55% 0 15% 0)}
  100%{clip-path:inset(0 0 78% 0)}
}

/* buttons */
.btns{
  margin-top:20px;
  display:grid;
  gap:12px;
}

.btn{
  height:54px;
  border:none;
  border-radius:17px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:9px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  transition:transform .2s ease, box-shadow .2s ease;
  position:relative;
  overflow:hidden;
  isolation:isolate;
}

.btn i{
  font-size:1rem;
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:translateY(0);
}

.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 10%,
    rgba(255,255,255,.42) 50%,
    transparent 90%
  );
  transform:translateX(-120%);
  z-index:1;
}

.btn:hover::before{
  animation:shine .9s;
}

.btn::after{
  content:"";
  position:absolute;
  inset:1px;
  border-radius:inherit;
  background:linear-gradient(180deg, rgba(255,255,255,.08), transparent);
  z-index:0;
  pointer-events:none;
}

.btn > *{
  position:relative;
  z-index:2;
}

.btn-login{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  box-shadow:
    0 0 12px rgba(59,130,246,.50),
    0 0 25px rgba(59,130,246,.20),
    0 12px 24px rgba(37,99,235,.22);
}

.btn-login:hover{
  box-shadow:
    0 0 16px rgba(59,130,246,.62),
    0 0 30px rgba(59,130,246,.28),
    0 16px 30px rgba(37,99,235,.26);
}

.btn-admin{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  box-shadow:
    0 0 12px rgba(239,68,68,.52),
    0 0 25px rgba(239,68,68,.22),
    0 12px 24px rgba(220,38,38,.22);
}

.btn-admin:hover{
  box-shadow:
    0 0 16px rgba(239,68,68,.62),
    0 0 30px rgba(239,68,68,.30),
    0 16px 30px rgba(220,38,38,.28);
}

@keyframes shine{
  100%{
    transform:translateX(120%);
  }
}

/* marquee */
.marquee{
  margin-top:16px;
  overflow:hidden;
  white-space:nowrap;
  border-top:1px solid rgba(255,255,255,.06);
  padding-top:12px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation:marquee 14s linear infinite;
  font-size:.85rem;
  color:#ffd0d0;
}

@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-100%)}
}

/* footer */
.footer{
  margin-top:14px;
  font-size:.8rem;
  color:#b8c4da;
  line-height:1.5;
}

/* runtime effects */
@keyframes shakeHard{
  0%{transform:translate(0,0)}
  20%{transform:translate(-6px,4px)}
  40%{transform:translate(6px,-4px)}
  60%{transform:translate(-4px,2px)}
  80%{transform:translate(4px,-2px)}
  100%{transform:translate(0,0)}
}

@keyframes flashGlitch{
  0%{opacity:0}
  20%{opacity:.6}
  40%{opacity:.2}
  60%{opacity:.7}
  100%{opacity:0}
}

@media (max-width:480px){
  body{
    padding:16px;
  }

  .top-status{
    top:12px;
    left:12px;
    font-size:.84rem;
    padding:7px 10px;
  }

  .card{
    max-width:100%;
    border-radius:26px;
    padding:26px 18px 18px;
  }

  .logo{
    width:78px;
    height:78px;
    font-size:30px;
    border-radius:22px;
  }

  h1{
    font-size:1.36rem;
  }

  .btn{
    height:52px;
    font-size:.96rem;
  }

  .footer{
    font-size:.76rem;
  }
}
</style>
</head>
<body>

<div class="scanlines"></div>
<div class="noise"></div>

<div class="top-status" id="topStatus">
  <div class="dot"></div>
  Login gagal
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo">
      <span class="logo-icon">❌</span>
    </div>
  </div>

  <h1>Home.Net</h1>

  <div class="error-box">
    <i class="bi bi-x-circle"></i>
    <div class="error-text" id="errorText" data-text="$(error)">$(error)</div>
  </div>

  <div class="btns">
    <a href="$(link-login)" class="btn btn-login">
      <i class="bi bi-box-arrow-in-right"></i>
      Login kembali
    </a>

    <a href="https://wa.me/6282152400352" class="btn btn-admin">
      <i class="bi bi-headset"></i>
      Hubungi Admin
    </a>
  </div>

  <div class="marquee">
    <span>
      ⚠️ Voucher salah • Voucher habis • Hubungi Admin jika bermasalah • Jangan bagikan kode voucher
    </span>
  </div>

  <div class="footer">
    © 2026 Home.Net • Powered by MikroTik | Muhammad Rafiq Amin
  </div>
</div>

<audio id="errorSound" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2023/03/25/audio_8c7a4b4c9f.mp3?filename=error-2-126514.mp3" type="audio/mpeg">
</audio>

<script>
(function () {
  const audio = document.getElementById('errorSound');
  const topStatus = document.getElementById('topStatus');
  const errorText = document.getElementById('errorText');
  let effectPlayed = false;

  function triggerVibrate() {
    if ('vibrate' in navigator) {
      navigator.vibrate([200, 100, 200, 100, 300]);
    }
  }

  function screenShake() {
    document.body.style.animation = 'shakeHard .4s';
    setTimeout(() => {
      document.body.style.animation = '';
    }, 400);
  }

  function glitchFlash() {
    const flash = document.createElement('div');
    flash.style.position = 'fixed';
    flash.style.inset = '0';
    flash.style.background = 'rgba(255,0,0,0.15)';
    flash.style.zIndex = '9999';
    flash.style.pointerEvents = 'none';
    flash.style.animation = 'flashGlitch .4s';
    document.body.appendChild(flash);

    setTimeout(() => {
      if (flash.parentNode) flash.parentNode.removeChild(flash);
    }, 400);
  }

  function glitchErrorText() {
    if (!errorText) return;

    errorText.classList.add('glitching');

    setTimeout(() => {
      errorText.classList.remove('glitching');
    }, 1600);
  }

  function runEffectsOnly() {
    triggerVibrate();
    screenShake();
    glitchFlash();
    glitchErrorText();
  }

  function playErrorEffect() {
    if (effectPlayed) return;
    effectPlayed = true;

    runEffectsOnly();

    if (!audio) return;

    audio.volume = 0.85;
    audio.currentTime = 0;

    const playPromise = audio.play();

    if (playPromise && typeof playPromise.then === 'function') {
      playPromise.catch(() => {
        const unlockAudio = () => {
          audio.play().catch(() => {});
          document.removeEventListener('click', unlockAudio);
          document.removeEventListener('touchstart', unlockAudio);
        };

        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });
      });
    }
  }

  function hideTopStatus() {
    if (!topStatus) return;

    topStatus.classList.add('hide');

    setTimeout(() => {
      if (topStatus && topStatus.parentNode) {
        topStatus.parentNode.removeChild(topStatus);
      }
    }, 600);
  }

  document.addEventListener('DOMContentLoaded', () => {
    playErrorEffect();
    setTimeout(hideTopStatus, 5000);
  });
})();
</script>

</body>
</html>
